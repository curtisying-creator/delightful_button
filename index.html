<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Go Button</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Russo+One&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 60px;
    background: radial-gradient(ellipse at center, #1a3a6e 0%, #0a1a3a 60%, #050d1f 100%);
    font-family: 'Russo One', sans-serif;
    cursor: none;
  }

  .cursor {
    width: 20px;
    height: 20px;
    border: 3px solid #fff;
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, background 0.2s, width 0.2s, height 0.2s;
    z-index: 9999;
    mix-blend-mode: difference;
  }
  .cursor.hovering {
    width: 50px; height: 50px;
    background: rgba(255,220,0,0.2);
    border-color: #ffd700;
  }
  .cursor.clicking {
    transform: translate(-50%, -50%) scale(0.7);
    background: rgba(255,220,0,0.5);
  }

  h1 {
    color: #fff;
    font-size: 2rem;
    letter-spacing: 4px;
    font-family: 'Black Han Sans', sans-serif;
    text-transform: uppercase;
    animation: titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 20px rgba(100,160,255,0.6), 2px 2px 0 #000; }
    50%       { text-shadow: 0 0 50px rgba(100,200,255,1),   2px 2px 0 #000; }
  }

  .title-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ── WRAPPER ── */
  .mk-button-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 560px;
    height: 130px;
  }

  /* Pentagon clip-path: angled left & right sides */
  /* points: top-left, top-right, right-tip, bottom-right, bottom-left, left-tip */
  /* indent = 36px on each side for proportional breathing room */

  .mk-button {
    position: relative;
    width: 500px;
    height: 100px;
    border: none;
    outline: none;
    cursor: none;
    z-index: 3;
    overflow: visible;
    background: transparent;
    padding: 0;
    transition: transform 0.08s ease;
    clip-path: polygon(36px 0%, calc(100% - 36px) 0%, 100% 50%, calc(100% - 36px) 100%, 36px 100%, 0% 50%);
  }
  .mk-button:active { transform: scale(0.96); }

  /* Silver outer border — sits behind, noticeably thicker */
  .btn-outer {
    position: absolute;
    inset: -12px;
    clip-path: polygon(36px 0%, calc(100% - 36px) 0%, 100% 50%, calc(100% - 36px) 100%, 36px 100%, 0% 50%);
    background: linear-gradient(180deg,
      #ffffff 0%,
      #e8e8e8 15%,
      #c0c0c0 40%,
      #a8a8a8 55%,
      #c8c8c8 75%,
      #f0f0f0 100%
    );
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.8)) drop-shadow(0 0 8px rgba(200,200,200,0.4));
  }

  /* Golden body */
  .btn-body {
    position: absolute;
    inset: 0;
    clip-path: polygon(36px 0%, calc(100% - 36px) 0%, 100% 50%, calc(100% - 36px) 100%, 36px 100%, 0% 50%);
    background: linear-gradient(180deg,
      #fff9c0 0%,
      #ffe44d 12%,
      #ffd000 35%,
      #e6a800 60%,
      #c47f00 80%,
      #a86000 100%
    );
    overflow: hidden;
  }

  /* Shine sweep */
  .btn-body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.55) 50%, transparent 70%);
    animation: shineSweep 2.4s ease-in-out infinite;
  }
  @keyframes shineSweep {
    0%   { transform: translateX(-140%); }
    60%  { transform: translateX(140%); }
    100% { transform: translateX(140%); }
  }

  /* Top highlight ridge */
  .btn-body::after {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 38%;
    border-radius: 0 0 50% 50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.55) 0%, transparent 100%);
  }

  /* Text — generous padding for breathing room (8px min touch target) */
  .btn-label {
    position: relative;
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 0 1.5em;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.75rem;
    letter-spacing: 3px;
    line-height: 1.3;
    color: #4a2800;
    text-shadow:
      0 2px 0 rgba(255,255,255,0.4),
      0 -1px 0 rgba(0,0,0,0.5),
      2px 2px 4px rgba(0,0,0,0.4);
    user-select: none;
    text-transform: uppercase;
    animation: labelBounce 1.8s ease-in-out infinite;
  }
  @keyframes labelBounce {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-2px); }
  }

  /* Glow outline — pentagon shape via SVG polygon trick */
  .btn-glow {
    position: absolute;
    inset: -14px;
    clip-path: polygon(36px 0%, calc(100% - 36px) 0%, 100% 50%, calc(100% - 36px) 100%, 36px 100%, 0% 50%);
    background: transparent;
    border: 3px solid rgba(255,220,0,0.6);
    pointer-events: none;
    animation: glowPulse 1.6s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(255,200,0,0.4));  opacity: 0.8; }
    50%       { filter: drop-shadow(0 0 18px rgba(255,220,0,0.95)); opacity: 1; }
  }

  /* Burst ring — pentagon shape, expands and fades */
  .burst-ring {
    position: absolute;
    inset: -22px;
    clip-path: polygon(36px 0%, calc(100% - 36px) 0%, 100% 50%, calc(100% - 36px) 100%, 36px 100%, 0% 50%);
    border: 5px solid #ffd700;
    opacity: 0;
    pointer-events: none;
    z-index: 6;
    transform-origin: center;
  }
  .burst-anim {
    animation: burst 0.5s cubic-bezier(0.2, 0.6, 0.4, 1) forwards !important;
  }
  @keyframes burst {
    0%   { opacity: 1;   transform: scale(1);    filter: drop-shadow(0 0 8px rgba(255,220,0,0.9)); }
    40%  { opacity: 0.8; transform: scale(1.25); filter: drop-shadow(0 0 16px rgba(255,220,0,0.7)); }
    100% { opacity: 0;   transform: scale(1.65); filter: drop-shadow(0 0 2px rgba(255,220,0,0)); }
  }

  /* ── BURST CANVAS ── */
  #burstCanvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    width: 100%;
    height: 100%;
  }

  /* Button squish on click */
  .mk-button.squish {
    animation: squish 0.38s cubic-bezier(0.36, 0.07, 0.19, 0.97) forwards;
  }
  @keyframes squish {
    0%   { transform: scale(1); }
    18%  { transform: scaleX(0.86) scaleY(1.12); }
    48%  { transform: scaleX(1.09) scaleY(0.91); }
    72%  { transform: scaleX(0.97) scaleY(1.04); }
    100% { transform: scale(1); }
  }

  /* Screen flash */
  #flashOverlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 99;
    background: rgba(255,240,100,0);
  }
  #flashOverlay.flash {
    animation: screenFlash 0.3s ease-out forwards;
  }
  @keyframes screenFlash {
    0%   { background: rgba(255,255,255,0.55); }
    100% { background: rgba(255,255,255,0); }
  }

  /* Feedback */
  .feedback {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 3px;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,220,100,0.9), 2px 2px 0 #000;
    height: 36px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s, transform 0.25s;
  }
  .feedback.show { opacity: 1; transform: translateY(0); }

  /* Particles */
  .particle-field { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,220,60,0.25);
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    from { transform: translateY(110vh) scale(0.5); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.6; }
    to   { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .hint {
    color: rgba(255,255,255,0.45);
    font-size: 0.8rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Power level alert — bottom right, purple, auto-dismiss */
  .power-alert {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 24px;
    background: linear-gradient(90deg, #5b3d8a 0%, #7c5cbf 50%, #6b4c9a 100%);
    color: #fff;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(91,61,138,0.5), 0 0 0 1px rgba(255,255,255,0.1);
    z-index: 200;
    opacity: 0;
    transform: translateX(120%);
    transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }
  .power-alert.show {
    opacity: 1;
    transform: translateX(0);
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="particle-field" id="particles"></div>

<div class="title-section">
  <h1>Ready to Create?</h1>
  <p class="hint">Click the button</p>
</div>

<div class="mk-button-wrap" id="btnWrap">
  <button class="mk-button" id="mkBtn" aria-label="Let's Go Button">
    <div class="btn-outer"></div>
    <div class="btn-body"></div>
    <div class="btn-label" id="btnLabel">Let's Go Button</div>
    <div class="btn-glow"></div>
    <div class="burst-ring" id="burstRing"></div>
  </button>
</div>

<div class="feedback" id="feedback">✨ POWERING UP!!!</div>
<div id="flashOverlay"></div>
<canvas id="burstCanvas"></canvas>

<p class="hint">Current Hype Level: <span id="clickCount">0</span></p>

<div class="power-alert" id="powerAlert">Your power level is insane!!!</div>

<script>
  /* ── Custom cursor ── */
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  const btn = document.getElementById('mkBtn');
  btn.addEventListener('mouseenter', () => cursor.classList.add('hovering'));
  btn.addEventListener('mouseleave', () => cursor.classList.remove('hovering'));
  btn.addEventListener('mousedown',  () => cursor.classList.add('clicking'));
  btn.addEventListener('mouseup',    () => cursor.classList.remove('clicking'));

  /* ── Floating background particles ── */
  const field = document.getElementById('particles');
  for (let i = 0; i < 22; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random() * 10 + 4;
    p.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${6+Math.random()*10}s;animation-delay:${Math.random()*10}s;`;
    field.appendChild(p);
  }

  /* ── Canvas burst system ── */
  const canvas = document.getElementById('burstCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let raf = null;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const COLORS = ['#ffd700','#ff6b6b','#ff9f43','#48dbfb','#ff9ff3','#54a0ff','#5f27cd','#00d2d3','#ffffff','#ffeaa7','#fd79a8'];
  const SHAPES = ['circle','square','triangle','star','diamond'];

  class Particle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      const angle  = Math.random() * Math.PI * 2;
      const speed  = 4 + Math.random() * 14;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - (Math.random() * 4); // slight upward bias
      this.gravity = 0.35 + Math.random() * 0.2;
      this.drag    = 0.97;
      this.color   = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.shape   = SHAPES[Math.floor(Math.random() * SHAPES.length)];
      this.size    = 6 + Math.random() * 12;
      this.rot     = Math.random() * Math.PI * 2;
      this.rotV    = (Math.random() - 0.5) * 0.3;
      this.alpha   = 1;
      this.life    = 0;
      this.maxLife = 55 + Math.random() * 35;
      // Wobble for confetti flutter
      this.wobble  = Math.random() * Math.PI * 2;
      this.wobbleV = 0.12 + Math.random() * 0.08;
      this.scaleX  = 1;
    }

    update() {
      this.life++;
      this.wobble += this.wobbleV;
      this.scaleX = Math.cos(this.wobble); // flutter effect
      this.vx *= this.drag;
      this.vy *= this.drag;
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.rot += this.rotV;
      this.alpha = Math.max(0, 1 - (this.life / this.maxLife) * 1.1);
    }

    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.scale(this.scaleX, 1);
      ctx.fillStyle = this.color;
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 0.5;

      const s = this.size;
      ctx.beginPath();
      if (this.shape === 'circle') {
        ctx.arc(0, 0, s / 2, 0, Math.PI * 2);
      } else if (this.shape === 'square') {
        ctx.rect(-s/2, -s/2, s, s);
      } else if (this.shape === 'triangle') {
        ctx.moveTo(0, -s/2);
        ctx.lineTo(s/2, s/2);
        ctx.lineTo(-s/2, s/2);
        ctx.closePath();
      } else if (this.shape === 'diamond') {
        ctx.moveTo(0, -s/2);
        ctx.lineTo(s/2, 0);
        ctx.lineTo(0, s/2);
        ctx.lineTo(-s/2, 0);
        ctx.closePath();
      } else if (this.shape === 'star') {
        for (let i = 0; i < 5; i++) {
          const outerAngle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
          const innerAngle = outerAngle + (2 * Math.PI) / 10;
          const ox = Math.cos(outerAngle) * s/2;
          const oy = Math.sin(outerAngle) * s/2;
          const ix = Math.cos(innerAngle) * s/4;
          const iy = Math.sin(innerAngle) * s/4;
          i === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
          ctx.lineTo(ix, iy);
        }
        ctx.closePath();
      }
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    get dead() { return this.life >= this.maxLife; }
  }

  // Emoji pop particles
  class EmojiParticle {
    constructor(x, y) {
      this.x = x;
      this.y = y;
      const emojis = ['⭐','✨','💫','🌟','🎉','🎊','💥','🔥','❤️','🌈'];
      this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 8;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 2;
      this.gravity = 0.2;
      this.alpha = 1;
      this.scale = 0.3 + Math.random() * 0.7;
      this.life = 0;
      this.maxLife = 50 + Math.random() * 30;
    }
    update() {
      this.life++;
      this.vy += this.gravity;
      this.x += this.vx;
      this.y += this.vy;
      this.scale += 0.015;
      this.alpha = Math.max(0, 1 - (this.life / this.maxLife) * 1.2);
    }
    draw(ctx) {
      ctx.save();
      ctx.globalAlpha = this.alpha;
      ctx.font = `${Math.round(20 * this.scale)}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.emoji, this.x, this.y);
      ctx.restore();
    }
    get dead() { return this.life >= this.maxLife; }
  }

  function spawnBurst(x, y) {
    // Confetti/shape particles — lots of them
    for (let i = 0; i < 80; i++) particles.push(new Particle(x, y));
    // Emoji pops — a handful
    for (let i = 0; i < 10; i++) particles.push(new EmojiParticle(x, y));
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => !p.dead);
    particles.forEach(p => { p.update(); p.draw(ctx); });
    if (particles.length > 0) raf = requestAnimationFrame(loop);
    else raf = null;
  }

  /* ── Click interaction ── */
  const label       = document.getElementById('btnLabel');
  const feedback    = document.getElementById('feedback');
  const burstRing   = document.getElementById('burstRing');
  const flashOverlay = document.getElementById('flashOverlay');
  let feedbackTimer = null;

  const clickCountEl = document.getElementById('clickCount');
  const powerAlert = document.getElementById('powerAlert');
  let clickCount = 0;
  let powerAlertTimer = null;

  btn.addEventListener('click', (e) => {
    clickCount++;
    clickCountEl.textContent = clickCount;

    const powerMilestones = [50, 100, 200, 500, 1000, 10000];
    if (powerMilestones.includes(clickCount)) {
      powerAlert.classList.remove('show');
      void powerAlert.offsetWidth;
      powerAlert.classList.add('show');
      if (powerAlertTimer) clearTimeout(powerAlertTimer);
      powerAlertTimer = setTimeout(() => {
        powerAlert.classList.remove('show');
        powerAlertTimer = null;
      }, 5000);
    }

    /* Get button center in screen coords */
    const rect = btn.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;

    /* Burst ring */
    burstRing.classList.remove('burst-anim');
    void burstRing.offsetWidth;
    burstRing.classList.add('burst-anim');

    /* Button squish */
    btn.classList.remove('squish');
    void btn.offsetWidth;
    btn.classList.add('squish');
    btn.addEventListener('animationend', () => btn.classList.remove('squish'), { once: true });

    /* Screen flash */
    flashOverlay.classList.remove('flash');
    void flashOverlay.offsetWidth;
    flashOverlay.classList.add('flash');

    /* Label flash */
    label.style.transition = 'color 0.06s, text-shadow 0.06s';
    label.style.color = '#fff';
    label.style.textShadow = '0 0 24px rgba(255,255,200,1), 0 0 50px gold';
    setTimeout(() => { label.style.color = ''; label.style.textShadow = ''; }, 220);

    /* Canvas burst */
    spawnBurst(cx, cy);
    if (!raf) raf = requestAnimationFrame(loop);

    /* Feedback */
    feedback.classList.remove('show');
    void feedback.offsetWidth;
    feedback.classList.add('show');
    if (feedbackTimer) clearTimeout(feedbackTimer);
    feedbackTimer = setTimeout(() => { feedback.classList.remove('show'); feedbackTimer = null; }, 1500);
  });
</script>
</body>
</html>
